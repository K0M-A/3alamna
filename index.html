<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏆 منصة عـالـمنـا | 3alamna - نظام النخبة التعليمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #38bdf8; 
            --primary-dark: #0284c7;
            --bg: #020617; 
            --card: rgba(15, 23, 42, 0.95);
            --border: rgba(56, 189, 248, 0.3);
            --input-bg: rgba(15, 23, 42, 0.8);
            --accent: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body { 
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 5% 5%, rgba(56, 189, 248, 0.2) 0%, transparent 35%),
                radial-gradient(circle at 95% 95%, rgba(30, 144, 255, 0.2) 0%, transparent 35%);
            color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        .auth-container { 
            background: var(--card); backdrop-filter: blur(25px); padding: 35px 25px; 
            border-radius: 35px; border: 1px solid var(--border); 
            width: 100%; max-width: 650px; text-align: center;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.8);
            animation: slideUp 0.7s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .profile-upload { position: relative; width: 130px; height: 130px; margin: 0 auto 20px; }
        #profile-preview { 
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover; 
            border: 3px solid var(--primary); padding: 4px; background: #000;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }
        .upload-icon { 
            position: absolute; bottom: 5px; right: 5px; background: var(--primary); 
            width: 35px; height: 35px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--bg);
        }

        h1 { font-size: 2.2rem; font-weight: 900; margin-bottom: 5px; color: #fff; }
        .slogan { color: #94a3b8; font-size: 0.9rem; margin-bottom: 25px; }

        .auth-form { display: none; text-align: right; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        @media (max-width: 550px) { .grid-inputs { grid-template-columns: 1fr; } }

        .full-width { grid-column: span 1; }
        @media (min-width: 551px) { .full-width { grid-column: span 2; } }

        .form-group { margin-bottom: 10px; position: relative; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--primary); margin-bottom: 5px; font-weight: 700; margin-right: 5px; }
        
        input, select { 
            width: 100%; padding: 12px 15px 12px 42px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); background: var(--input-bg); 
            color: white; outline: none; font-size: 0.9rem; transition: 0.3s;
        }
        input:focus, select:focus { border-color: var(--primary); background: rgba(0,0,0,0.4); }
        .form-group i { position: absolute; left: 14px; bottom: 13px; color: var(--primary); font-size: 1rem; }

        .btn { 
            width: 100%; padding: 14px; border-radius: 14px; border: none; 
            cursor: pointer; font-weight: 800; font-size: 1.1rem; 
            background: linear-gradient(135deg, var(--primary), var(--primary-dark)); 
            color: #fff; transition: 0.3s; margin-top: 10px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3); }

        .status-msg { background: rgba(245, 158, 11, 0.1); border: 1px solid var(--accent); color: var(--accent); padding: 15px; border-radius: 15px; margin: 20px 0; display: none; }

        #otp-modal {
            display: none; position: fixed; inset: 0; background: rgba(2,6,23,0.98);
            z-index: 2000; align-items: center; justify-content: center; padding: 20px;
        }
        .otp-box { background: #111827; padding: 35px; border-radius: 30px; border: 1px solid var(--primary); max-width: 400px; width: 100%; text-align: center; }

        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 4px solid #1e293b; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 15px;">جاري إرسال طلبك للنخبة...</p>
    </div>

    <div class="auth-container">
        <img src="logo.png" id="main-logo" style="width: 80px; margin-bottom: 10px;">
        
        <div id="pending-msg" class="status-msg">
            <i class="fas fa-user-clock fa-2x"></i>
            <h3 style="margin-top: 10px;">طلبك قيد المراجعة</h3>
            <p style="font-size: 0.85rem; margin-top: 5px;">أهلاً بك! تم استلام بياناتك بنجاح. يقوم فريق "كريم عمر" الآن بمراجعة الطلب لضمان جودة المنصة. سيتم تفعيل حسابك قريباً.</p>
            <button class="btn" onclick="location.reload()" style="background: var(--accent); margin-top: 15px; font-size: 0.9rem;">تحديث الحالة</button>
        </div>

        <div class="profile-upload" id="profile-area" style="display: none;">
            <img src="https://via.placeholder.com/150" id="profile-preview" alt="Avatar">
            <label for="profile-input" class="upload-icon"><i class="fas fa-pen"></i></label>
            <input type="file" id="profile-input" hidden accept="image/*" onchange="previewImage(this)">
        </div>

        <div id="welcome-header">
            <h1>عـالـمنـا</h1>
            <p class="slogan">Social Media & Pro Learning Hub</p>
        </div>

        <div id="main-view">
            <button class="btn" onclick="showForm('signup')">
                <i class="fas fa-user-plus"></i> إنشاء حساب جديد
            </button>
            <button class="btn" onclick="showForm('login')" style="background: transparent; border: 2px solid var(--primary); margin-top: 15px;">
                <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
            </button>
        </div>

        <div id="signup-view" class="auth-form">
            <div class="grid-inputs">
                <div class="form-group full-width">
                    <label>الاسم الرباعي</label>
                    <input type="text" id="reg-name" placeholder="أدخل اسمك بالكامل">
                    <i class="fas fa-address-card"></i>
                </div>
                <div class="form-group">
                    <label>رقم الموبايل</label>
                    <input type="tel" id="reg-phone" placeholder="01xxxxxxxxx">
                    <i class="fas fa-phone"></i>
                </div>
                <div class="form-group">
                    <label>الرقم القومي (14 رقم)</label>
                    <input type="number" id="reg-nid" placeholder="29000000000000">
                    <i class="fas fa-id-badge"></i>
                </div>
                <div class="form-group">
                    <label>كلمة السر</label>
                    <input type="password" id="reg-pass" placeholder="اختر كلمة سر قوية">
                    <i class="fas fa-lock"></i>
                </div>
                <div class="form-group">
                    <label>المحافظة</label>
                    <input type="text" id="reg-city" placeholder="بني سويف">
                    <i class="fas fa-map-marker-alt"></i>
                </div>
                <div class="form-group">
                    <label>المدرسة</label>
                    <input type="text" id="reg-school" placeholder="اسم مدرستك">
                    <i class="fas fa-school"></i>
                </div>
                <div class="form-group">
                    <label>تاريخ الميلاد</label>
                    <input type="date" id="reg-dob">
                </div>
                <div class="form-group">
                    <label>النوع</label>
                    <select id="reg-gender">
                        <option value="male">ذكر</option>
                        <option value="female">أنثى</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>المستوى الدراسي</label>
                    <select id="reg-grade">
                        <option value="1">الأول الثانوي</option>
                        <option value="2">الثاني الثانوي</option>
                        <option value="3">الثالث الثانوي</option>
                        <option value="teacher">معلم / محاضر</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>الشعبة / النظام</label>
                    <select id="reg-system">
                        <option value="عام">ثانوي عام</option>
                        <option value="أزهر">ثانوي أزهري</option>
                        <option value="خدمات">خدمات</option>
                        <option value="منازل">منازل</option>
                        <option value="بكالوريا">بكالوريا</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label>كود الصديق (اختياري لربح 20 نقطة)</label>
                    <input type="text" id="reg-ref" placeholder="3AL-XXXXX">
                    <i class="fas fa-user-friends"></i>
                </div>
            </div>
            <button class="btn" onclick="sendOTP()">إرسال طلب الانضمام</button>
            <span class="btn" onclick="showMain()" style="background:none; border:none; font-size:0.9rem; color:var(--primary);">رجوع</span>
        </div>

        <div id="login-view" class="auth-form">
            <div class="form-group">
                <label>رقم الموبايل</label>
                <input type="tel" id="login-phone" placeholder="01xxxxxxxxx">
                <i class="fas fa-mobile-alt"></i>
            </div>
            <div class="form-group">
                <label>كلمة السر</label>
                <input type="password" id="login-pass" placeholder="********">
                <i class="fas fa-key"></i>
            </div>
            <button class="btn" onclick="attemptLogin()">دخول للمنصة</button>
            <span class="btn" onclick="showMain()" style="background:none; border:none; font-size:0.9rem; color:var(--primary);">رجوع</span>
        </div>
    </div>

    <div id="otp-modal">
        <div class="otp-box">
            <h2 style="color: var(--primary);">تأكيد الهوية 🔐</h2>
            <p style="font-size: 0.8rem; color: #94a3b8; margin-top: 10px;">أدخل الكود التالي لإتمام الطلب:</p>
            <h1 id="fake-code" style="letter-spacing: 10px; margin: 20px 0; font-size: 2.5rem;"></h1>
            <input type="text" id="otp-input" maxlength="6" style="text-align: center; font-size: 1.5rem; letter-spacing: 5px;">
            <button class="btn" style="margin-top: 25px;" onclick="handleFinalRegistration()">تأكيد وإرسال للمراجعة</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCcsXU47AU2uOt8P6PYXwoqySDDJ0nexIY",
            authDomain: "almna-6b8e4.firebaseapp.com",
            projectId: "almna-6b8e4",
            databaseURL: "https://almna-6b8e4-default-rtdb.firebaseio.com",
            storageBucket: "almna-6b8e4.firebasestorage.app",
            appId: "1:22935857339:web:d46184d81a3ca9636b619e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selectedFile = null;
        let generatedOTP;
        let tempUser = {};

        function showForm(id) {
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('welcome-header').style.display = 'none';
            document.querySelectorAll('.auth-form').forEach(f => f.style.display = 'none');
            document.getElementById(id + '-view').style.display = 'block';
            if(id === 'signup') document.getElementById('profile-area').style.display = 'block';
        }

        function showMain() { location.reload(); }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                selectedFile = input.files[0];
                const reader = new FileReader();
                reader.onload = (e) => document.getElementById('profile-preview').src = e.target.result;
                reader.readAsDataURL(selectedFile);
            }
        }

        function generateUniqueRef() {
            return '3AL-' + Math.random().toString(36).substr(2, 5).toUpperCase();
        }

        function sendOTP() {
            const name = document.getElementById('reg-name').value;
            const phone = document.getElementById('reg-phone').value;
            const nid = document.getElementById('reg-nid').value;
            const pass = document.getElementById('reg-pass').value;

            if(!name || phone.length < 11 || nid.length < 14 || !pass) return alert("من فضلك أكمل كافة البيانات بشكل صحيح!");

            tempUser = {
                name, phone, nid, pass,
                city: document.getElementById('reg-city').value,
                school: document.getElementById('reg-school').value,
                dob: document.getElementById('reg-dob').value,
                gender: document.getElementById('reg-gender').value,
                grade: document.getElementById('reg-grade').value,
                system: document.getElementById('reg-system').value,
                referralUsed: document.getElementById('reg-ref').value.trim().toUpperCase(),
                myCode: generateUniqueRef(),
                points: 0,
                status: "pending",
                joinedAt: new Date().toISOString()
            };

            generatedOTP = Math.floor(100000 + Math.random() * 900000);
            document.getElementById('fake-code').innerText = generatedOTP;
            document.getElementById('otp-modal').style.display = 'flex';
        }

        async function handleFinalRegistration() {
            if(document.getElementById('otp-input').value != generatedOTP) return alert("الكود غير صحيح!");
            document.getElementById('loader').style.display = 'flex';
            document.getElementById('otp-modal').style.display = 'none';

            try {
                const snap = await db.ref('students/' + tempUser.phone).once('value');
                if(snap.exists()) throw new Error("رقم الهاتف مسجل مسبقاً!");

                // نظام النقاط
                if(tempUser.referralUsed) {
                    const users = await db.ref('students').once('value');
                    let refOwner = null;
                    users.forEach(u => { if(u.val().myCode === tempUser.referralUsed) refOwner = u.key; });
                    if(refOwner && refOwner !== tempUser.phone) {
                        const currentP = (await db.ref('students/'+refOwner+'/points').once('value')).val() || 0;
                        await db.ref('students/'+refOwner+'/points').set(currentP + 10);
                        tempUser.points = 20;
                    }
                }

                // رفع الصورة الافتراضية إذا لم يتم اختيار صورة
                tempUser.profilePic = "https://res.cloudinary.com/demg5rgiz/image/upload/v1710000000/default.png";
                
                await db.ref('students/' + tempUser.phone).set(tempUser);
                document.getElementById('signup-view').style.display = 'none';
                document.getElementById('profile-area').style.display = 'none';
                document.getElementById('pending-msg').style.display = 'block';

            } catch (e) { alert(e.message); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        function attemptLogin() {
            const phone = document.getElementById('login-phone').value;
            const pass = document.getElementById('login-pass').value;
            document.getElementById('loader').style.display = 'flex';
            db.ref('students/' + phone).once('value', snap => {
                document.getElementById('loader').style.display = 'none';
                const user = snap.val();
                if(user && user.pass === pass) {
                    if(user.status === "pending") {
                        document.getElementById('login-view').style.display = 'none';
                        document.getElementById('pending-msg').style.display = 'block';
                    } else if(user.status === "blocked") {
                        alert("⚠️ حسابك محظور.");
                    } else {
                        localStorage.setItem('userPhone', phone);
                        window.location.href = "go.html";
                    }
                } else { alert("بيانات خاطئة!"); }
            });
        }
    </script>
</body>
</html>
